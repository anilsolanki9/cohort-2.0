<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylish Webpage</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <div id="wrapper">
      <div class="backgroundShape"></div>
      <nav>
        <div class="left">
          <a href="#">Moncler<span>.</span></a>
          <div class="center">
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
          </div>
        </div>
        <div class="right">
          <i class="ri-search-line"></i>
          <div class="cartDiv">
            <div class="bagIconDiv">
              <i class="ri-shopping-bag-4-fill"></i>
            </div>
            <span>Cart</span>
          </div>
        </div>
      </nav>
      <div id="section1">
        <div class="topLeft">
          <h2>Moncler<br />Hooded stylist<br />Sweatshirt</h2>
          <div class="starsDiv">
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
          </div>
          <div class="floatingLeftText">Moncler stylist sweatshirt</div>
        </div>

        <div class="colorsBlock">
          <div class="colors">
            <div class="color">
              <div class="color-blue"></div>
            </div>
            <div class="color">
              <div class="color-yellow"></div>
            </div>
            <div class="color">
              <div class="color-red"></div>
            </div>
            <div class="color">
              <div class="color-dark"></div>
            </div>
          </div>
          <p>Color</p>
        </div>

        <div class="center-image">
          <img src="./assets/center-image.png" alt="" />
        </div>

        <div class="size-div">
          <p>Select size<span>(size guide)</span></p>
          <div class="size-boxes">
            <div class="item item-1">S</div>
            <div class="item item-2">M</div>
            <div class="item item-3">L</div>
            <div class="item item-4">XL</div>
            <div class="item item-5">2XL</div>
          </div>
        </div>

        <div class="discount-tablet">
          <h2>25%<span>off</span></h2>
          <p>Our all new arrivals</p>
          <div class="floating-round">
            <div class="arrow-box">
              <i class="ri-arrow-right-long-line"></i>
            </div>
            <p>Explore<br />More</p>
          </div>
        </div>

        <div class="price-box">
          <p>$190.00</p>
          <h2>$150.00</h2>
          <div class="buy">
            <div class="heart">
              <i class="ri-heart-line"></i>
            </div>
            <div class="buyBtn">
              <span class="text">Buy it Now </span><span class="arrow"><i class="ri-arrow-right-s-line"></i></span>
            </div>
          </div>
        </div>

        <div class="images">
          <div class="image img1"><img src="./assets/image2.jpg" alt="" /></div>
          <div class="image img2"><img src="./assets/image3.jpg" alt="" /></div>
          <div class="image img3"><img src="./assets/image4.png" alt="" /></div>
        </div>
      </div>
    </div>
    <script src="/script.js"></script>
  </body>
</html>
