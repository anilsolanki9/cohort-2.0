<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insta App Post Like</title>
    <script src="https://kit.fontawesome.com/f80e3ee2a2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="shortcut icon"
      href="https://images.unsplash.com/photo-1773496396202-195e92545dea?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxM3x8fGVufDB8fHx8fA%3D%3D"
      type="image/x-icon"
    />
  </head>
  <body>
    <main>
      <h2>Instagram</h2>
      <div class="container">
        <div class="post">
          <div class="video-box">
            <div class="like-layer">
              <i class="fa-solid fa-heart heart"></i>
            </div>
            <video id="reel" muted preload="auto" loop autoplay src="./4abd4d7eecb0a4d6b241a1e5ec7f45e7.mp4"></video>
          </div>
          <div class="details">
            <div class="profile">
              <img src="https://images.unsplash.com/photo-1773496396339-447f78cc8fac?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxNHx8fGVufDB8fHx8fA%3D%3D" alt="" />
            </div>
            <div class="about">
              <div class="username">
                anuvajion9
                <button class="follow-btn">Follow</button>
              </div>
              <div class="bio">An artist who loves music.</div>
            </div>
          </div>
          <div class="feature-layer">
            <i class="fa-solid fa-play play"></i>
            <i class="fa-solid fa-volume-high sound"></i>
            <!-- <i class="fa-solid fa-volume-xmark muted"></i> -->

            <!--  <i class="fa-regular fa-heart line-heart"></i> -->
          </div>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
