<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./image.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <div class="info">
            <h3>Highest Score: <span class="high-score">0</span></h3>
          </div>
          <div class="info">
            <h3>Score: <span class="score">0</span></h3>
          </div>
          <div class="info">
            <h3>Time: <span class="time">00:00</span></h3>
          </div>
        </div>
        <div class="board"></div>
      </section>
      <div class="modal">
        <div class="start-game">
          <h1>🐍</h1>
          <p>Eat . Grow . Servive</p>
          <h2>Use <span class="box">arrow keys</span> to move</h2>
          <h3>Eat the <span>●</span> to grow and score</h3>
          <h3>Avoid walls and your own tail!</h3>
          <button class="btn btn-start">Start Game</button>
          <h4>Best: <span>19</span></h4>
        </div>
        <div class="game-over">
          <h1>💥</h1>
          <h3>Game Over</h3>
          <div class="score-time">
            <div class="score">
              <p>Score</p>
              <h4>0</h4>
            </div>
            <div class="time">
              <p>Time</p>
              <h4>00:00</h4>
            </div>
          </div>
          <div class="best">
            <p>Best</p>
            <h3>12</h3>
          </div>
          <button class="btn btn-restart">Play Again</button>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
