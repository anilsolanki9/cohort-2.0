<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPL Champion Team</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="page">
        <div class="bg"></div>
        <div class="noise"></div>
        <div class="stripe"></div>
        <div class="corner-deco"></div>

        <div class="content">
          <!-- TOP -->
          <div class="top-bar">
            <div class="ipl-badge">
              <span class="label">Indian Premier League</span>
              <span class="season">IPL 2026</span>
            </div>
            <div class="trophy-count">
              <span class="trophies">🏆🏆🏆🏆🏆</span>
              <span class="trophy-label">Championships Won</span>
            </div>
          </div>

          <!-- MIDDLE -->
          <div class="main">
            <div class="team-abbr">CSK</div>
            <div class="team-full">Chennai Super Kings</div>
            <div class="divider"></div>
            <div class="captain-block">
              <span class="captain-label">Captain</span>
              <span class="captain-name">Mahendra Singh Dhoni</span>
            </div>
          </div>

          <!-- BOTTOM -->
          <div class="bottom-row">
            <div class="color-palette">
              <div class="color-swatch primary-swatch" title="Primary: Yellow"></div>
              <div class="color-swatch secondary-swatch" title="Secondary: Blue"></div>
              <span class="palette-label">Team Colors</span>
            </div>
            <span class="watermark">Whistle Podu</span>
          </div>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
