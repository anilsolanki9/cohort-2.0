<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div id="section">
        <div class="reels-container">
          <div class="reel">
            <div class="sound">
              <i class="ri-volume-up-fill"></i>
            </div>
            <div class="play">
              <i class="ri-play-fill"></i>
            </div>
            <video autoplay muted loop src="./reels/video1.mp4"></video>
            <div class="bottom">
              <div class="user">
                <img
                  src="https://images.unsplash.com/photo-1730446157031-f5fe8c1956f5?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt=""
                />
                <h1>anshika01</h1>
                <button>Follow</button>
              </div>
              <p class="caption">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Nesciunt nobis.</p>

              <div class="right">
                <div class="like">
                  <h4 class="like-icon"><i class="ri-heart-3-line"></i></h4>
                  <h6 class="like-count">564</h6>
                </div>
                <div class="comment">
                  <h4 class="comment-icon"><i class="ri-chat-3-line"></i></h4>
                  <h6 class="comment-count">34</h6>
                </div>
                <div class="remix">
                  <h4 class="remix-icon"><i class="ri-recycle-line"></i></h4>
                </div>
                <div class="share">
                  <h4 class="share-icon"><i class="ri-send-plane-fill"></i></h4>
                </div>
                <div class="menu">
                  <h4 class="menu-icon"><i class="ri-more-2-fill"></i></h4>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
