<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div class="card">
        <div class="user-details">
          <div class="user-images">
            <div class="banner-container">
              <img
                src="https://i.pinimg.com/1200x/38/3e/b1/383eb13e3bdcd850353a7a8597380b5d.jpg"
                alt=""
                class="banner"
              />
              <img
                src="https://i.pinimg.com/736x/16/9d/bd/169dbd80b274e148a0bacbbf696df185.jpg"
                alt=""
                class="profile"
              />
              <div class="exp">
                <span>exp. </span>
                <div class="exp-grid">
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                  <div class="strip"></div>
                </div>
              </div>
              <div class="follow">Follow <i class="ri-add-line"></i></div>
            </div>
          </div>
          <div class="user-about">
            <h1>Nooah Thompson</h1>
            <p>Product Designer who focuses on simplicity & usability.</p>
          </div>
        </div>
        <div class="social-details">
          <div class="stats">
            <h3>72.9K</h3>
            <p>Likes</p>
          </div>
          <div class="stats">
            <h3>828</h3>
            <p>Posts</p>
          </div>
          <div class="stats">
            <h3>342.9K</h3>
            <p>Views</p>
          </div>
          <div class="link-icon"><i preload class="ri-instagram-line"></i></div>
          <div class="link-icon"><i class="ri-twitter-x-line"></i></div>
          <div class="link-icon last"><i class="ri-threads-line"></i></div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
