<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Asthma Page</title>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
            rel="stylesheet" />
    </head>
    <body>
        <div id="wrapper">
            <div class="section1">
                <h1 class="main-heading">AERIS</h1>
                <div class="line-div"></div>
                <div class="volume-present-div">
                    <div class="volume-div">
                        <div class="volume-text">Turn up your<br />volume</div>
                        <div class="volume-img"><i class="ri-volume-up-fill"></i></div>
                    </div>
                    <div class="present-div">
                        <div class="present-text">View in<br />PRESENT MODE</div>
                        <div class="present-img"><i class="ri-slideshow-3-line"></i></div>
                    </div>
                </div>
                <div class="red-main-box">
                    <img src="./section1/img-bg-2.png" alt="" class="img-background" />
                    <img src="./section1/asthma-enhaler.png" alt="" class="asthma-enhaler" />
                    <dic class="inner-circle-div">
                        <div class="circle" id="innercircle1"></div>
                        <img src="./section1/cell.png" alt="" class="circle" id="innercircle3" />
                        <div class="circle" id="innercircle2"></div>
                        <div class="circle" id="innercircle4"></div>
                        <img src="./section1/lungs-inner2.png" alt="" class="lungs-inner" />
                    </dic>
                    <div class="circle" id="smcircle"></div>
                    <div class="upper-box">
                        <img
                            src="./section1/blood-1.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle1" />
                        <img
                            src="./section1/blood-2.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle2" />
                        <img
                            src="./section1/blood-3.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle3" />
                        <img
                            src="./section1/blood-4.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle4" />
                        <img
                            src="./section1/blood-5.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle5" />
                        <img
                            src="./section1/blood-6.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle6" />
                        <img
                            src="./section1/blood-7.jpg"
                            alt=""
                            class="circle"
                            id="upper-circle7" />
                    </div>
                    <img
                        src="./section1/chemical-structure.png"
                        alt=""
                        class="chemical-structure" />
                    <img src="./section1/barcode.png" alt="" class="bar-code" />
                    <div id="fill-box"></div>
                    <div id="border-blk-box"></div>
                    <img src="./section1/medical-mask.png" alt="" class="mask-image" />
                    <div class="plus-box">
                        <i class="ri-add-large-line"></i>
                        <i class="ri-add-large-line"></i>
                        <i class="ri-add-large-line"></i>
                    </div>
                    <div class="dots-box">
                        <i class="ri-circle-fill"></i>
                        <i class="ri-circle-fill"></i>
                        <i class="ri-circle-fill"></i>
                    </div>
                    <img src="./section1/test-tubes.png" alt="" class="tubes" />
                    <img
                        src="./section1/syring-holding-hand.png"
                        alt=""
                        class="hand-holding-syring" />
                    <div class="center-text1">Guiding every breadth.</div>
                    <div class="center-text2">easing every step.</div>
                    <img src="./section1/call-2.png" alt="" class="cell-pic" />
                    <div class="big-circle-outer">
                        <div class="big-circle-inner">
                            <img
                                src="./section1/big-fire-center.jpg"
                                alt=""
                                class="big-circle-img" />
                        </div>
                    </div>
                    <img src="./section1/shape-removebg-preview.png" alt="" class="flower-shape" />
                    <img src="./section1/lungs-big.png" alt="" class="lungs-big" />
                    <div class="left-box">
                        <img src="./section1/dark-1.jpg" alt="" class="circle" />
                        <img src="./section1/dark-2.jpg" alt="" class="circle" />
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
