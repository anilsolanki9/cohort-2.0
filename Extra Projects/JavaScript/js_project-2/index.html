<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanBan Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <nav>
        <div class="left">Kanban</div>
        <div class="right">
          <button id="toggle-modal">Add New Task +</button>
        </div>
      </nav>
      <section id="board">
        <div id="todo" class="task-column">
          <div class="heading">
            <div class="left">To Do</div>
            <div class="right">Count</div>
          </div>
          <div draggable="true" class="task">
            <h2>Task title</h2>
            <p>Desc of task</p>
            <button id="delete-btn">Delete</button>
          </div>
        </div>
        <div id="progress" class="task-column">
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">Count</div>
          </div>
          <div draggable="true" class="task">
            <h2>Task title</h2>
            <p>Desc of task</p>
            <button id="delete-btn">Delete</button>
          </div>
        </div>
        <div id="done" class="task-column">
          <div class="heading">
            <div class="left">Done</div>
            <div class="right">Count</div>
          </div>
          <div draggable="true" class="task">
            <h2>Task title</h2>
            <p>Desc of task</p>
            <button id="delete-btn">Delete</button>
          </div>
        </div>
      </section>
    </main>

    <div class="modal add-new-task">
      <div class="bg"></div>
      <div class="center">
        <input id="task-title" type="text" placeholder="Task title" />
        <textarea id="task-desc" placeholder="task description" name="" id=""></textarea>
        <button id="add-new-task" class="add-task-btn">Add Task</button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
